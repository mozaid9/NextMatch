<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
  .stack { position: relative; z-index: 2; width: 880px; text-align: center; display: flex; flex-direction: column; gap: 56px; }
  h1 { font-size: 92px; font-weight: 900; line-height: 1.12; letter-spacing: -0.015em; }
  .built { font-size: 110px; font-weight: 900; letter-spacing: -0.02em; }
  .footer { position: absolute; bottom: 220px; left: 0; right: 0; display: flex; align-items: center; justify-content: center; gap: 18px; z-index: 2; }
  .dot { width: 18px; height: 18px; border-radius: 50%; background: #21D07A; box-shadow: 0 0 24px rgba(33,208,122,0.8); }
  .footer span { font-size: 38px; font-weight: 600; color: rgba(255,255,255,0.55); }
</style></head>
<body><div class="slide">
  <div class="pitch"><div class="centre-circle"></div><div class="halfway"></div><div class="spot"></div></div>
  <div class="glow"></div>
  <div class="stack">
    <h1>I got tired of chasing my mates for <span class="green">£6</span><br>every single week</h1>
    <div class="built">so I built<br>an app <span style="font-size:96px">⚽</span></div>
  </div>
  <div class="footer"><div class="dot"></div><span>a soft launch story 🧵</span></div>
</div></body></html>
