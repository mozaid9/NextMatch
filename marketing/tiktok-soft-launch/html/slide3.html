<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
  .stack { position: relative; z-index: 2; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 70px; }
  .intro { font-size: 64px; font-weight: 700; color: rgba(255,255,255,0.75); }
  .wordmark { font-size: 148px; }
  .badge {
    display: inline-flex; align-items: center; gap: 18px;
    background: #101C22; border: 2px solid rgba(33,208,122,0.35);
    border-radius: 100px; padding: 22px 44px;
  }
  .badge .ball { font-size: 44px; }
  .badge span { font-size: 36px; font-weight: 700; color: #21D07A; }
  .tagline { font-size: 78px; font-weight: 900; line-height: 1.18; letter-spacing: -0.01em; width: 900px; }
</style></head>
<body><div class="slide">
  <div class="pitch"><div class="centre-circle"></div><div class="halfway"></div><div class="spot"></div></div>
  <div class="glow"></div>
  <div class="stack">
    <div class="intro">So I'm building</div>
    <div class="wordmark"><span class="next">NEXT</span><span class="match">MATCH</span></div>
    <div class="badge"><span class="ball">⚽</span><span>find your next game</span></div>
    <div class="tagline">Weekly football,<br>without the group chat <span class="green">carnage.</span></div>
  </div>
</div></body></html>
