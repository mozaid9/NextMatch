<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
  .slide { justify-content: flex-start; }
  .head { margin-top: 150px; text-align: center; z-index: 2; }
  .head h1 { font-size: 84px; font-weight: 900; letter-spacing: -0.01em; }
  .head p { font-size: 42px; font-weight: 600; line-height: 1.4; color: rgba(255,255,255,0.72); width: 880px; margin: 36px auto 0; }
  .head p .green { font-weight: 800; }
  .phone {
    margin-top: 64px; width: 700px; border-radius: 64px; padding: 18px;
    background: #15242B; border: 2px solid rgba(255,255,255,0.12);
    box-shadow: 0 -10px 80px rgba(33,208,122,0.18), 0 30px 80px rgba(0,0,0,0.6);
    z-index: 2;
  }
  .phone img { display: block; width: 100%; border-radius: 48px; }
</style></head>
<body><div class="slide">
  <div class="glow" style="top: 30%;"></div>
  <div class="head">
    <h1>Set up the match<br>in <span class="green">30 seconds</span></h1>
    <p>Venue, time, format, price per head.<br>Then invite your whole squad in <span class="green">one tap</span>.</p>
  </div>
  <div class="phone"><img src="img/create_match.png" alt=""></div>
</div></body></html>
