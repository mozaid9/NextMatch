<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
  .slide { justify-content: flex-start; }
  .head { margin-top: 150px; text-align: center; z-index: 2; }
  .head h1 { font-size: 92px; font-weight: 900; letter-spacing: -0.01em; }
  .head p { font-size: 42px; font-weight: 600; line-height: 1.4; color: rgba(255,255,255,0.72); width: 900px; margin: 36px auto 0; }
  .head p .green { font-weight: 800; }
  .phone {
    margin-top: 60px; width: 700px; border-radius: 64px; padding: 18px;
    background: #15242B; border: 2px solid rgba(255,255,255,0.12);
    box-shadow: 0 -10px 80px rgba(33,208,122,0.18), 0 30px 80px rgba(0,0,0,0.6);
    z-index: 2; position: relative;
  }
  .phone img { display: block; width: 100%; border-radius: 48px; }
  .sticker {
    position: absolute; right: -30px; top: 350px; transform: rotate(6deg);
    background: #21D07A; color: #071014; font-size: 34px; font-weight: 800;
    padding: 18px 30px; border-radius: 20px; box-shadow: 0 14px 40px rgba(0,0,0,0.5);
    z-index: 3;
  }
</style></head>
<body><div class="slide">
  <div class="glow" style="top: 30%;"></div>
  <div class="head">
    <h1>No payment,<br><span class="green">no place.</span></h1>
    <p>Everyone pays their share in the app to lock their spot. You see live <span class="green">who's in and who's paid</span>.</p>
  </div>
  <div class="phone">
    <img src="img/dashboard_scrolled.png" alt="">
    <div class="sticker">chasing £6? never again 🫡</div>
  </div>
</div></body></html>
