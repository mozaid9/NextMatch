<!DOCTYPE html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="base.css"><style>
  .stack { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 80px; text-align: center; width: 920px; }
  h1 { font-size: 120px; font-weight: 900; letter-spacing: -0.02em; }
  .lines { display: flex; flex-direction: column; gap: 44px; }
  .line { font-size: 58px; font-weight: 700; line-height: 1.3; color: rgba(255,255,255,0.85); }
  .line .green { font-weight: 900; }
  .pill {
    display: inline-block; background: rgba(33,208,122,0.12); border: 3px solid #21D07A;
    border-radius: 100px; padding: 10px 36px; color: #21D07A; font-weight: 900;
  }
  .footer { position: absolute; bottom: 200px; left: 0; right: 0; text-align: center; z-index: 2; }
  .footer .wordmark { font-size: 64px; }
  .footer .sub { font-size: 32px; font-weight: 600; color: rgba(255,255,255,0.5); margin-top: 16px; }
</style></head>
<body><div class="slide">
  <div class="pitch"><div class="centre-circle"></div><div class="halfway"></div><div class="spot"></div></div>
  <div class="glow"></div>
  <div class="stack">
    <h1>It's nearly<br><span class="green">ready.</span></h1>
    <div class="lines">
      <div class="line"><span class="green">Follow</span> to watch me build it</div>
      <div class="line">Comment <span class="pill">early access</span><br>and you're on the list</div>
    </div>
  </div>
  <div class="footer">
    <div class="wordmark"><span class="next">NEXT</span><span class="match">MATCH</span></div>
    <div class="sub">coming soon to the UK 🇬🇧</div>
  </div>
</div></body></html>
