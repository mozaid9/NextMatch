<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="NextMatch helps footballers find, join and pay for local games.">
  <meta name="theme-color" content="#071014">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="NextMatch">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>NextMatch</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      background: #071014;
      margin: 0;
      min-height: 100%;
    }

    #nextmatch-splash {
      align-items: center;
      background: #071014;
      color: #f5f7fa;
      display: flex;
      flex-direction: column;
      font-family: Inter, Arial, sans-serif;
      inset: 0;
      justify-content: center;
      position: fixed;
      z-index: 9999;
    }

    .nextmatch-mark {
      color: #f5f7fa;
      font-size: 76px;
      font-style: italic;
      font-weight: 900;
      letter-spacing: 0;
      line-height: 0.9;
      position: relative;
    }

    .nextmatch-mark::after {
      background: #21d07a;
      border-radius: 4px;
      bottom: 5px;
      content: "";
      height: 12px;
      left: 32px;
      position: absolute;
      transform: rotate(-35deg);
      transform-origin: left center;
      width: 76px;
    }

    .nextmatch-ball {
      animation: nextmatch-kick 1.6s cubic-bezier(0.18, 0.82, 0.2, 1) infinite;
      background: #f5f7fa;
      border: 3px solid #071014;
      border-radius: 50%;
      box-shadow: 0 0 18px rgba(33, 208, 122, 0.34);
      height: 24px;
      margin-left: 70px;
      margin-top: -54px;
      position: relative;
      width: 24px;
    }

    .nextmatch-ball::before {
      background: #071014;
      clip-path: polygon(50% 0, 100% 38%, 82% 100%, 18% 100%, 0 38%);
      content: "";
      height: 9px;
      left: 7px;
      position: absolute;
      top: 6px;
      width: 9px;
    }

    .nextmatch-wordmark {
      color: #21d07a;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0;
      margin-top: 18px;
    }

    .nextmatch-tagline {
      color: #a8b3ba;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-top: 8px;
      text-transform: uppercase;
    }

    @keyframes nextmatch-kick {
      0% {
        opacity: 0;
        transform: translate(-34px, 28px) rotate(0);
      }
      18% {
        opacity: 1;
      }
      74% {
        opacity: 1;
        transform: translate(94px, -26px) rotate(560deg);
      }
      100% {
        opacity: 0;
        transform: translate(132px, -30px) rotate(720deg);
      }
    }
  </style>
</head>
<body>
  <div id="nextmatch-splash" aria-label="NextMatch loading">
    <div class="nextmatch-mark">N</div>
    <div class="nextmatch-ball"></div>
    <div class="nextmatch-wordmark">NEXTMATCH</div>
    <div class="nextmatch-tagline">Find your next game.</div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('nextmatch-splash');
      if (splash) splash.remove();
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
